name: Deploy Bot

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Validate JavaScript
        run: npm run check

      - name: Setup SSH
        run: |

          mkdir -p ~/.ssh

          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_ed25519

          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -H 48.202.58.124 >> ~/.ssh/known_hosts

      - name: Deploy files
        run: |

          rsync -avz --delete \
          --exclude=node_modules \
          --exclude=auth \
          --exclude=data/reservas.json \
          --exclude=logs \
          ./ jose@48.202.58.124:/home/jose/bot2/

      - name: Restart bot
        run: |

          ssh jose@48.202.58.124 "
          cd /home/jose/bot2 &&
          if ! command -v tesseract >/dev/null 2>&1 || ! command -v convert >/dev/null 2>&1; then
            sudo apt-get update &&
            sudo apt-get install -y tesseract-ocr imagemagick
          fi &&
          npm install &&
          pm2 restart bot2 &&
          (pm2 restart bot2-dashboard || pm2 start dashboard.js --name bot2-dashboard)
          "
