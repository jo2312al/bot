name: Deploy Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DEPLOY_HOST: ec2-3-21-92-184.us-east-2.compute.amazonaws.com
      DEPLOY_USER: ubuntu
      DEPLOY_PATH: /opt/hotel-bot
      HAS_EC2_KEY: ${{ secrets.EC2_SSH_KEY != '' }}

    steps:

      - name: EC2 key required
        if: env.HAS_EC2_KEY != 'true'
        run: echo "Add the EC2_SSH_KEY repository secret, then run this workflow again."

      - name: Checkout repo
        if: env.HAS_EC2_KEY == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: env.HAS_EC2_KEY == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: env.HAS_EC2_KEY == 'true'
        run: npm install

      - name: Validate JavaScript
        if: env.HAS_EC2_KEY == 'true'
        run: npm run check

      - name: Setup SSH
        if: env.HAS_EC2_KEY == 'true'
        run: |

          mkdir -p ~/.ssh

          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519

          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy files
        if: env.HAS_EC2_KEY == 'true'
        run: |

          rsync -avz --delete \
          --exclude=node_modules \
          --exclude=auth \
          --exclude=data/reservas.json \
          --exclude=data/closedDates.json \
          --exclude=data/calendarReservations.json \
          --exclude=data/groupMessages.json \
          --exclude=data/rackStatus.json \
          --exclude=data/*.db \
          --exclude=data/*.db-* \
          --exclude=logs \
          ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Prepare MySQL on VM
        if: env.HAS_EC2_KEY == 'true'
        run: |

          ssh "$DEPLOY_USER@$DEPLOY_HOST" "DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'REMOTE'
          set -eo pipefail
          cd "$DEPLOY_PATH"

          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y tesseract-ocr imagemagick sqlite3 default-mysql-client default-mysql-server
          if systemctl list-unit-files | grep -q '^mysql\.service'; then
            sudo systemctl enable --now mysql
          elif systemctl list-unit-files | grep -q '^mariadb\.service'; then
            sudo systemctl enable --now mariadb
          else
            echo "No mysql.service or mariadb.service found after install"
            exit 1
          fi

          if [ ! -f .env ]; then
            MYSQL_APP_PASSWORD="$(openssl rand -hex 16)"
            umask 077
            printf '%s\n' \
              'USE_MYSQL=1' \
              'MYSQL_HOST=127.0.0.1' \
              'MYSQL_PORT=3306' \
              'MYSQL_DATABASE=hotel_bot' \
              'MYSQL_USER=hotel_bot' \
              "MYSQL_PASSWORD=$MYSQL_APP_PASSWORD" > .env
          fi

          grep -q '^USE_MYSQL=' .env || echo 'USE_MYSQL=1' >> .env
          grep -q '^MYSQL_HOST=' .env || echo 'MYSQL_HOST=127.0.0.1' >> .env
          grep -q '^MYSQL_PORT=' .env || echo 'MYSQL_PORT=3306' >> .env
          grep -q '^MYSQL_DATABASE=' .env || echo 'MYSQL_DATABASE=hotel_bot' >> .env
          grep -q '^MYSQL_USER=' .env || echo 'MYSQL_USER=hotel_bot' >> .env
          if ! grep -q '^MYSQL_PASSWORD=' .env; then echo "MYSQL_PASSWORD=$(openssl rand -hex 16)" >> .env; fi
          chmod 600 .env

          MYSQL_DATABASE_VALUE="$(grep '^MYSQL_DATABASE=' .env | tail -n1 | cut -d= -f2-)"
          MYSQL_USER_VALUE="$(grep '^MYSQL_USER=' .env | tail -n1 | cut -d= -f2-)"
          MYSQL_PASSWORD_VALUE="$(grep '^MYSQL_PASSWORD=' .env | tail -n1 | cut -d= -f2-)"

          MYSQL_SQL_FILE="$(mktemp)"
          cat > "$MYSQL_SQL_FILE" <<SQL
CREATE DATABASE IF NOT EXISTS \`$MYSQL_DATABASE_VALUE\` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
CREATE USER IF NOT EXISTS '$MYSQL_USER_VALUE'@'localhost' IDENTIFIED BY '$MYSQL_PASSWORD_VALUE';
CREATE USER IF NOT EXISTS '$MYSQL_USER_VALUE'@'127.0.0.1' IDENTIFIED BY '$MYSQL_PASSWORD_VALUE';
ALTER USER '$MYSQL_USER_VALUE'@'localhost' IDENTIFIED BY '$MYSQL_PASSWORD_VALUE';
ALTER USER '$MYSQL_USER_VALUE'@'127.0.0.1' IDENTIFIED BY '$MYSQL_PASSWORD_VALUE';
GRANT ALL PRIVILEGES ON \`$MYSQL_DATABASE_VALUE\`.* TO '$MYSQL_USER_VALUE'@'localhost';
GRANT ALL PRIVILEGES ON \`$MYSQL_DATABASE_VALUE\`.* TO '$MYSQL_USER_VALUE'@'127.0.0.1';
FLUSH PRIVILEGES;
SQL
          sudo mysql < "$MYSQL_SQL_FILE"
          rm -f "$MYSQL_SQL_FILE"
          REMOTE

      - name: Install app dependencies and migrate data
        if: env.HAS_EC2_KEY == 'true'
        run: |

          ssh "$DEPLOY_USER@$DEPLOY_HOST" "DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_PATH"
          npm install --omit=dev
          set -a
          . ./.env
          set +a
          npm run mysql:migrate
          REMOTE

      - name: Restart services
        if: env.HAS_EC2_KEY == 'true'
        run: |

          ssh "$DEPLOY_USER@$DEPLOY_HOST" "DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_PATH"
          sudo install -m 644 deploy/hotel-bot.service /etc/systemd/system/hotel-bot.service
          sudo install -m 644 deploy/hotel-night-bot.service /etc/systemd/system/hotel-night-bot.service
          sudo install -m 644 deploy/hotel-dashboard.service /etc/systemd/system/hotel-dashboard.service
          sudo systemctl daemon-reload
          sudo systemctl enable hotel-bot hotel-night-bot hotel-dashboard
          sudo systemctl restart hotel-bot hotel-night-bot hotel-dashboard
          sudo systemctl --no-pager --full status hotel-bot hotel-night-bot hotel-dashboard
          REMOTE
